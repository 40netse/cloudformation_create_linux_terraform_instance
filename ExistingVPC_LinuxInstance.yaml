---
AWSTemplateFormatVersion: '2010-09-09'
Description: AWS CloudFormation Template to Add Linux Terraform Instance to an Existing VPC
Metadata:
  AWS::CloudFormation::Interface:
    ParameterGroups:
    - Label:
        default: Linux Instance Configuration
      Parameters:
      - VPCID
      - AZForInstance1
      - Public1Subnet
      - KeyPair
      - CIDRForInstanceAccess
      - ManagementCIDR1
      - ManagementCIDR2
      - ManagementCIDR3
      - InstanceType
    ParameterLabels:
      VPCID:
        default: Please enter the VPC specific details here
Parameters:
  VPCID:
    Type: AWS::EC2::VPC::Id
    Description: Enter the VPC that you want to use
  AZForInstance1:
    Type: AWS::EC2::AvailabilityZone::Name
    Description: Enter the AZ for the primary instance
  Public1Subnet:
    Type: AWS::EC2::Subnet::Id
    Description: Enter the value of the Public1 subnet
  CIDRForInstanceAccess:
    Type: String
    Default: 0.0.0.0/0
    Description: Enter the CIDR from which instance needs to be accessed
  ManagementCIDR1:
    Type: String
    Default: 208.91.115.30/32
    Description: First CIDR allowed management access (SSH, ICMP)
  ManagementCIDR2:
    Type: String
    Default: 76.184.215.100/32
    Description: Second CIDR allowed management access (SSH, ICMP)
  ManagementCIDR3:
    Type: String
    Default: 159.48.172.13/32
    Description: Third CIDR allowed management access (SSH, ICMP)
  InstanceType:
    Type: String
    Default: c4.large
    AllowedValues:
    - m3.medium
    - m3.large
    - m3.xlarge
    - m3.2xlarge
    - c4.large
    - c4.xlarge
    - c4.2xlarge
    - c3.large
    - c3.xlarge
    - c3.2xlarge
    Description: Enter the instance type and size that you want for the Linux Instances
  KeyPair:
    Type: AWS::EC2::KeyPair::KeyName
    Description: Enter the keypair that you want to associate with the launch of the
      Instances
Mappings:
    RegionMap:
      us-east-1:
          ubuntuami: ami-02013f5b15758f4d4
      us-east-2:
          ubuntuami: ami-0209ee5cb40d1c54b
      us-west-1:
          ubuntuami: ami-083532ada23c5c24c
      us-west-2:
          ubuntuami: ami-03a1c8d65318aa1fc
Conditions:
  ManagementCIDR2Provided: !Not [!Equals [!Ref ManagementCIDR2, ""]]
  ManagementCIDR3Provided: !Not [!Equals [!Ref ManagementCIDR3, ""]]
Resources:
  InstanceRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
        - Effect: Allow
          Principal:
            Service:
            - ec2.amazonaws.com
          Action:
          - sts:AssumeRole
      Path: "/"
  InstancePolicies:
    Type: AWS::IAM::Policy
    Properties:
      PolicyName: root
      PolicyDocument:
        Statement:
        - Effect: Allow
          Action:
          - cloudwatch:*
          Resource:
          - "*"
        - Effect: Allow
          Action:
          - ec2:*
          - iam:*
          - elasticloadbalancing:*
          - autoscaling:*
          - elasticfilesystem:*
          - s3:*
          - logs:*
          - dynamodb:*
          - lambda:*
          - events:*
          Resource:
          - "*"
      Roles:
      - Ref: InstanceRole
  InstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Path: "/"
      Roles:
      - Ref: InstanceRole
  SecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      VpcId:
        Ref: VPCID
      GroupDescription: Allow SSH and Web UI
      SecurityGroupIngress:
      - IpProtocol: TCP
        FromPort: '22'
        ToPort: '22'
        CidrIp:
          Ref: CIDRForInstanceAccess
      - IpProtocol: TCP
        FromPort: '3000'
        ToPort: '3000'
        CidrIp:
          Ref: CIDRForInstanceAccess
  ManagementSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      VpcId:
        Ref: VPCID
      GroupDescription: Management access - SSH and ICMP from management CIDRs
      SecurityGroupIngress:
      - Description: SSH from ManagementCIDR1
        IpProtocol: tcp
        FromPort: '22'
        ToPort: '22'
        CidrIp: !Ref ManagementCIDR1
      - Description: ICMP from ManagementCIDR1
        IpProtocol: icmp
        FromPort: '-1'
        ToPort: '-1'
        CidrIp: !Ref ManagementCIDR1
      - Description: Web UI from ManagementCIDR1
        IpProtocol: tcp
        FromPort: '3000'
        ToPort: '3000'
        CidrIp: !Ref ManagementCIDR1
      - !If
        - ManagementCIDR2Provided
        - Description: SSH from ManagementCIDR2
          IpProtocol: tcp
          FromPort: '22'
          ToPort: '22'
          CidrIp: !Ref ManagementCIDR2
        - !Ref AWS::NoValue
      - !If
        - ManagementCIDR2Provided
        - Description: ICMP from ManagementCIDR2
          IpProtocol: icmp
          FromPort: '-1'
          ToPort: '-1'
          CidrIp: !Ref ManagementCIDR2
        - !Ref AWS::NoValue
      - !If
        - ManagementCIDR2Provided
        - Description: Web UI from ManagementCIDR2
          IpProtocol: tcp
          FromPort: '3000'
          ToPort: '3000'
          CidrIp: !Ref ManagementCIDR2
        - !Ref AWS::NoValue
      - !If
        - ManagementCIDR3Provided
        - Description: SSH from ManagementCIDR3
          IpProtocol: tcp
          FromPort: '22'
          ToPort: '22'
          CidrIp: !Ref ManagementCIDR3
        - !Ref AWS::NoValue
      - !If
        - ManagementCIDR3Provided
        - Description: ICMP from ManagementCIDR3
          IpProtocol: icmp
          FromPort: '-1'
          ToPort: '-1'
          CidrIp: !Ref ManagementCIDR3
        - !Ref AWS::NoValue
      - !If
        - ManagementCIDR3Provided
        - Description: Web UI from ManagementCIDR3
          IpProtocol: tcp
          FromPort: '3000'
          ToPort: '3000'
          CidrIp: !Ref ManagementCIDR3
        - !Ref AWS::NoValue
  LinuxInstance:
    Type: AWS::EC2::Instance
    Properties:
      ImageId: !FindInMap [RegionMap, !Ref 'AWS::Region', ubuntuami]
      UserData:
        Fn::Base64: |
           #!/bin/bash
           apt-get update -y
           apt-get install -y gnupg software-properties-common curl unzip lsof python3.11 python3.11-venv
           update-alternatives --install /usr/bin/python3 python3 /usr/bin/python3.11 2
           curl "https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip" -o "/tmp/awscliv2.zip"
           unzip /tmp/awscliv2.zip -d /tmp
           /tmp/aws/install
           rm -rf /tmp/awscliv2.zip /tmp/aws
           curl -fsSL https://apt.releases.hashicorp.com/gpg | gpg --dearmor -o /usr/share/keyrings/hashicorp-archive-keyring.gpg
           echo "deb [signed-by=/usr/share/keyrings/hashicorp-archive-keyring.gpg] https://apt.releases.hashicorp.com $(lsb_release -cs) main" > /etc/apt/sources.list.d/hashicorp.list
           apt-get update && apt-get install -y terraform
           apt-get install -y nodejs npm
           npm install -g n
           n lts
           hash -r
           curl -LsSf https://astral.sh/uv/install.sh | env UV_INSTALL_DIR=/usr/local/bin sh
           sudo -u ubuntu bash -c 'cd /home/ubuntu && git clone https://github.com/FortinetCloudCSE/fortinet-ui-terraform && cd fortinet-ui-terraform/ui && ./SETUP.sh'
           (crontab -u ubuntu -l 2>/dev/null; echo "@reboot /home/ubuntu/fortinet-ui-terraform/ui/RESTART.sh") | crontab -u ubuntu -
           sudo -u ubuntu bash -c 'cd /home/ubuntu/fortinet-ui-terraform/ui && ./RESTART.sh'
      InstanceType:
        Ref: InstanceType
      KeyName:
        Ref: KeyPair
      IamInstanceProfile:
        Ref: InstanceProfile
      NetworkInterfaces:
      - AssociatePublicIpAddress: 'true'
        DeviceIndex: '0'
        GroupSet:
        - Ref: SecurityGroup
        - Ref: ManagementSecurityGroup
        SubnetId:
          Ref: Public1Subnet
      Tags:
      - Key: Name
        Value:
          Fn::Join:
          - ''
          - - Ref: AWS::StackName
            - "-Linux"
Outputs:
  LinuxInstanceIP:
    Value: !GetAtt LinuxInstance.PublicIp
    Description: Connect to Linux instance using ssh to this IP
  LinuxInstanceID:
    Value:
      Ref: LinuxInstance
    Description: Instance ID of LinuxInstance

